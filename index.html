// ─── POOL MODULE (defined before INIT so globals exist for restoreLastTab) ───
// ─── KNOCKOUT PREDICTION POOL ────────────────────────────────────────────────
const POOL_WEIGHTS = { LAST_32:1, LAST_16:2, QUARTER_FINALS:4, SEMI_FINALS:8, THIRD_PLACE:4, FINAL:16 };
const POOL_CHAMP_BONUS = 10;
const POOL_ROUND_COUNT = { LAST_32:16, LAST_16:8, QUARTER_FINALS:4, SEMI_FINALS:2, THIRD_PLACE:1, FINAL:1 };
const POOL_ROUNDS = [
  { key:'LAST_32', label:'Round of 32' },
  { key:'LAST_16', label:'Round of 16' },
  { key:'QUARTER_FINALS', label:'Quarterfinals' },
  { key:'SEMI_FINALS', label:'Semifinals' },
  { key:'THIRD_PLACE', label:'Third Place' },
  { key:'FINAL', label:'🏆 Final' },
];

let poolPool     = localStorage.getItem('wc_pool_pool') || '';
let poolMe       = localStorage.getItem('wc_pool_me')   || '';
let poolName     = localStorage.getItem('wc_pool_name') || '';
let poolPicks    = {};      // { matchNumber: teamName }
let poolChampion = '';
let poolBoard    = null;    // last leaderboard payload from the Worker
let poolSub      = 'bracket';
let poolJoinMode = 'login';  // 'login' (personal code only) | 'signup' (full form)
let POOL_ADV     = null;    // advancedSets() cache, rebuilt each render
let POOL_R32FX   = {};      // { matchNumber: {home, away} } resolved R32 fixtures
let _poolSaveT   = null;

function poolEsc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function roundOfMatch(n){ n=+n;
  if(n>=73&&n<=88) return 'LAST_32';
  if(n>=89&&n<=96) return 'LAST_16';
  if(n>=97&&n<=100) return 'QUARTER_FINALS';
  if(n>=101&&n<=102) return 'SEMI_FINALS';
  if(n===103) return 'THIRD_PLACE';
  if(n===104) return 'FINAL';
  return null;
}
function koSlot(n){ for(const k in KO_SCHEDULE){ const s=KO_SCHEDULE[k].find(x=>x.n===+n); if(s) return s; } return null; }
function poolKickMs(n){ const s=koSlot(n); return s ? new Date(etToUtcISO(s.date,s.et)).getTime() : Infinity; }
function matchLocked(n){ return Date.now() >= poolKickMs(n); }
function poolChampLockMs(){ let min=Infinity; KO_SCHEDULE.LAST_32.forEach(s=>{ min=Math.min(min, new Date(etToUtcISO(s.date,s.et)).getTime()); }); return min; }
function championLocked(){ return Date.now() >= poolChampLockMs(); }

// Resolve a group-placement descriptor like '2A' or '1E' to an actual team via standings.
function resolvePlacement(desc){
  const m=/^([12])([A-L])$/.exec(desc);
  if(m){ const rows=standingsMap[m[2]]; if(rows && rows[+m[1]-1]) return rows[+m[1]-1].team; }
  return null; // third-place descriptors (e.g. '3rd A/B/C/D/F') resolve via the fixture itself
}
// Map each R32 slot (73-88) to its real fixture once the bracket is seeded.
function r32Fixtures(){
  const out={};
  const fx=allMatches.filter(m=>m.stage==='LAST_32' && groupOfTeam(m.homeTeam?.name) && groupOfTeam(m.awayTeam?.name));
  if(!fx.length) return out;
  KO_SCHEDULE.LAST_32.forEach(slot=>{
    const home=resolvePlacement(slot.home); if(!home) return;     // home side is always a group winner/runner-up
    const hc=canonName(home);
    const f=fx.find(m=>canonName(m.homeTeam.name)===hc || canonName(m.awayTeam.name)===hc);
    if(f) out[slot.n]={ home:f.homeTeam.name, away:f.awayTeam.name };
  });
  return out;
}

// Candidate teams for a slot. R32 → real fixtures; later rounds → the player's own picks.
function slotCandidates(n){ n=+n;
  if(n>=73&&n<=88){ const f=POOL_R32FX[n]; return f ? [f.home, f.away] : null; }
  const slot=koSlot(n); if(!slot) return null;
  return [poolRef(slot.home), poolRef(slot.away)];
}
function poolRef(ref){ let m;
  if((m=/^W (\d+)$/.exec(ref))) return poolPicks[m[1]] || null;
  if((m=/^W SF(\d)$/.exec(ref))) return poolPicks[m[1]==='1'?'101':'102'] || null;
  if((m=/^L SF(\d)$/.exec(ref))) return poolLoser(m[1]==='1'?'101':'102');
  return null;
}
function poolLoser(n){ const c=slotCandidates(n); const w=poolPicks[n]; if(!c||!w) return null; return c[0]===w?c[1]:(c[1]===w?c[0]:null); }

// After any change, drop picks that no longer match their slot's candidates (cascades downstream).
function validateBracket(){
  for(let n=73;n<=104;n++){
    const p=poolPicks[n]; if(!p) continue;
    const c=slotCandidates(n);
    if(!c || (c[0]!==p && c[1]!==p)) delete poolPicks[n];
  }
}

// ── results / scoring ──
function poolWinnerOf(m){
  const e=m._espn; if(e && e.advanceName) return e.advanceName;   // ESPN 'advance' flag — handles penalties
  const sc=m.score||{};
  if(sc.winner==='HOME_TEAM') return m.homeTeam?.name;
  if(sc.winner==='AWAY_TEAM') return m.awayTeam?.name;
  const p=sc.penalties;
  if(p && typeof p.home==='number' && typeof p.away==='number') return p.home>p.away ? m.homeTeam?.name : m.awayTeam?.name;
  const ft=sc.fullTime||{};
  if(typeof ft.home==='number' && typeof ft.away==='number' && ft.home!==ft.away) return ft.home>ft.away ? m.homeTeam?.name : m.awayTeam?.name;
  return null;
}
function advancedSets(){
  const adv={LAST_32:new Set(),LAST_16:new Set(),QUARTER_FINALS:new Set(),SEMI_FINALS:new Set(),THIRD_PLACE:new Set(),FINAL:new Set()};
  allMatches.forEach(m=>{ const st=m.stage; if(!adv[st]) return; if(m.status!=='FINISHED') return;
    const w=poolWinnerOf(m); if(w) adv[st].add(canonName(w)); });
  return adv;
}
function poolFinishedCount(stage){ return allMatches.filter(m=>m.stage===stage && m.status==='FINISHED').length; }
function poolRoundComplete(r){ return poolFinishedCount(r) >= POOL_ROUND_COUNT[r]; }
function poolPickResult(n){
  const r=roundOfMatch(n); const pick=poolPicks[n];
  if(!pick || !matchLocked(n) || !POOL_ADV) return '';
  if(POOL_ADV[r] && POOL_ADV[r].has(canonName(pick))) return 'yes';
  if(poolRoundComplete(r)) return 'no';
  return '';
}
function poolScore(p, adv, actualChamp){
  let pts=0, correct=0;
  for(const n in (p.picks||{})){ const r=roundOfMatch(n); if(!r) continue;
    if(adv[r] && adv[r].has(canonName(p.picks[n]))){ pts+=POOL_WEIGHTS[r]; correct++; } }
  if(actualChamp && p.champion && canonName(p.champion)===canonName(actualChamp)){ pts+=POOL_CHAMP_BONUS; correct++; }
  return { pts, correct };
}

// ── actions ──
function poolPick(n, team){ if(matchLocked(n)) return; poolPicks[n]=team; validateBracket(); renderPool(); savePoolSoon(); }
function poolSetChampion(v){ if(championLocked()) return; poolChampion=v; renderPool(); savePoolSoon(); }
function poolSetSub(s){ poolSub=s; renderPool(); if(s==='leaderboard') poolLoadBoard(); }
function poolCopyCode(){ try{ navigator.clipboard.writeText(poolMe); }catch(e){} }
function poolLeave(){
  ['wc_pool_pool','wc_pool_me','wc_pool_name'].forEach(k=>localStorage.removeItem(k));
  poolPool=''; poolMe=''; poolName=''; poolPicks={}; poolChampion=''; poolBoard=null; poolSub='bracket'; poolJoinMode='login';
  renderPool();
}
function savePoolSoon(){ clearTimeout(_poolSaveT); _poolSaveT=setTimeout(savePool, 700); }
function poolPicksStr(){ return Object.keys(poolPicks).filter(n=>poolPicks[n]).map(n=>n+':'+poolPicks[n]).join('|'); }
async function savePool(){
  if(!poolMe) return;
  const u=`${PROXY}?type=poolsave&pool=${encodeURIComponent(poolPool)}&me=${encodeURIComponent(poolMe)}`
    +`&name=${encodeURIComponent(poolName)}&picks=${encodeURIComponent(poolPicksStr())}&champion=${encodeURIComponent(poolChampion)}`;
  try{ await fetch(u); }catch(e){}
}
async function poolLoadBoard(){
  if(!poolMe) return;
  try{ const r=await fetch(`${PROXY}?type=poolboard&me=${encodeURIComponent(poolMe)}&pool=${encodeURIComponent(poolPool)}`);
    const d=await r.json(); if(d && d.players) poolBoard=d; }catch(e){}
  if(currentView==='pool' && poolSub==='leaderboard') renderPool();
}
function poolSetJoinMode(m){ poolJoinMode=m; renderPool(); }
async function poolLoginSubmit(){
  const me=document.getElementById('poolMeInput').value.trim();
  if(!me){ alert('Enter your personal code.'); return; }
  let d;
  try{ const r=await fetch(`${PROXY}?type=poolload&me=${encodeURIComponent(me)}`); d=await r.json(); }
  catch(e){ alert('Could not reach the pool. Try again.'); return; }
  if(!d || !d.entry){ alert('No bracket found for that code. If you are new, tap “Sign up”.'); return; }
  poolMe=me; poolPool='';
  poolPicks=d.entry.picks||{}; poolChampion=d.entry.champion||''; poolName=d.entry.name||'';
  localStorage.setItem('wc_pool_me', poolMe);
  localStorage.setItem('wc_pool_name', poolName);
  localStorage.removeItem('wc_pool_pool');
  poolSub='bracket'; renderPool(); poolLoadBoard();
}
async function poolSignupSubmit(){
  const pool=document.getElementById('poolCodeInput').value.trim();
  const name=document.getElementById('poolNameInput').value.trim();
  let me=document.getElementById('poolMeInput').value.trim();
  if(!pool || !name){ alert('Enter the pool code and your name.'); return; }
  if(!me) me = name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') + '-' + Math.random().toString(36).slice(2,6);
  // make sure the personal code isn't already taken
  let chk;
  try{ const r=await fetch(`${PROXY}?type=poolload&me=${encodeURIComponent(me)}`); chk=await r.json(); }
  catch(e){ alert('Could not reach the pool. Try again.'); return; }
  if(chk && chk.entry){ alert('That personal code is already in use. If it is yours, tap “Log in”; otherwise pick a different code.'); return; }
  // create the entry (Worker requires the pool code for a new entry)
  let res;
  try{
    const u=`${PROXY}?type=poolsave&pool=${encodeURIComponent(pool)}&me=${encodeURIComponent(me)}&name=${encodeURIComponent(name)}&picks=&champion=`;
    res=await (await fetch(u)).json();
  }catch(e){ alert('Could not reach the pool. Try again.'); return; }
  if(!res || res.error){ alert('That pool code did not work. Double-check it with whoever set up the pool.'); return; }
  poolPool=pool; poolMe=me; poolName=name; poolPicks={}; poolChampion='';
  localStorage.setItem('wc_pool_me', poolMe);
  localStorage.setItem('wc_pool_name', poolName);
  localStorage.setItem('wc_pool_pool', poolPool);
  poolSub='bracket'; renderPool(); poolLoadBoard();
}

// ── render ──
function poolTeamList(){
  const s=new Set();
  allMatches.forEach(m=>{ [m.homeTeam?.name, m.awayTeam?.name].forEach(nm=>{ if(nm && groupOfTeam(nm)) s.add(nm); }); });
  return [...s].sort();
}
function poolTeamBtn(n, team, picked, locked, correct){
  if(!team) return `<div class="pool-team tbd">TBD</div>`;
  const cls=['pool-team']; if(picked) cls.push('picked'); if(locked) cls.push('locked');
  if(picked && correct==='yes') cls.push('correct'); if(picked && correct==='no') cls.push('wrong');
  const click=locked ? '' : `onclick="poolPick(${n}, this.dataset.t)"`;
  const mark = picked && correct==='yes' ? '<span class="rk ok">✓</span>'
             : picked && correct==='no'  ? '<span class="rk no">✗</span>' : '';
  return `<button class="${cls.join(' ')}" data-t="${poolEsc(team)}" ${click}>`
    + `<span class="pf">${flag(team)}</span><span class="pn">${poolEsc(team)}</span>${mark}</button>`;
}
function poolSlotHTML(slot){
  const n=slot.n, cands=slotCandidates(n), pick=poolPicks[n], locked=matchLocked(n), res=poolPickResult(n);
  const ko=new Date(etToUtcISO(slot.date, slot.et));
  const when=ko.toLocaleString('en-US',{ timeZone: tz(), month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
  let body;
  if(!cands || (!cands[0] && !cands[1])){
    body=`<div class="pool-tbd">${(n>=73&&n<=88) ? 'Teams set after the group stage' : 'Pick the earlier matches first'}</div>`;
  } else {
    const a=poolTeamBtn(n, cands[0], pick && pick===cands[0], locked, pick===cands[0]?res:'');
    const b=poolTeamBtn(n, cands[1], pick && pick===cands[1], locked, pick===cands[1]?res:'');
    body=`<div class="pool-pair">${a}<span class="pool-vs">v</span>${b}</div>`;
  }
  return `<div class="pool-slot ${locked?'locked':''}">`
    + `<div class="pool-slot-top"><span>Match ${n}</span><span>${locked?'🔒 ':''}${when} ${tzShort()}</span></div>${body}</div>`;
}
function poolChampionHTML(){
  const locked=championLocked();
  const actual = POOL_ADV && POOL_ADV.FINAL && POOL_ADV.FINAL.size ? [...POOL_ADV.FINAL][0] : '';
  let res='';
  if(actual){ const ok=poolChampion && canonName(poolChampion)===canonName(actual);
    res=`<div class="pool-champ-res ${ok?'correct':'wrong'}">Champion: ${flag(actual)} ${poolEsc(actual)}`
      + `${poolChampion ? (ok ? ' — your pick ✓ +'+POOL_CHAMP_BONUS : ' — you picked '+poolEsc(poolChampion)+' ✗') : ''}</div>`; }
  const opts=['<option value="">— pick a champion —</option>'].concat(
    poolTeamList().map(t=>`<option value="${poolEsc(t)}" ${t===poolChampion?'selected':''}>${poolEsc(t)}</option>`)).join('');
  const inner = locked
    ? `<div class="pool-champ-locked">${poolChampion ? flag(poolChampion)+' '+poolEsc(poolChampion) : '—'}<span class="pool-lock">🔒 locked</span></div>${res}`
    : `<select class="pool-select" onchange="poolSetChampion(this.value)">${opts}</select>`
      + `<div class="pool-hint">Locks at the first Round-of-32 kickoff. You can change it until then.</div>`;
  return `<div class="pool-champ"><div class="pool-champ-label">🏆 Tournament Champion<span class="pool-champ-bonus">+${POOL_CHAMP_BONUS} bonus</span></div>${inner}</div>`;
}
function poolBracketHTML(){
  let html=poolChampionHTML();
  POOL_ROUNDS.forEach(({key,label})=>{
    const slots=KO_SCHEDULE[key]||[];
    const wt=POOL_WEIGHTS[key];
    html+=`<div class="pool-round-head"><h2>${label}</h2><span class="wt">${wt} pt${wt>1?'s':''} each</span></div>`;
    slots.slice().sort((a,b)=>a.n-b.n).forEach(s=>{ html+=poolSlotHTML(s); });
  });
  return html;
}
function poolLeaderboardHTML(){
  const adv=POOL_ADV||advancedSets();
  const actualChamp = adv.FINAL && adv.FINAL.size ? [...adv.FINAL][0] : '';
  let rows=[];
  if(poolBoard && poolBoard.players){
    rows=poolBoard.players.map(p=>{ const s=poolScore(p,adv,actualChamp); return { name:p.name, champion:p.champion, ...s }; });
    rows.sort((a,b)=> b.pts-a.pts || b.correct-a.correct || a.name.localeCompare(b.name));
  }
  let html=`<div class="pool-board"><div class="pool-board-head"><h3>Leaderboard</h3>`
    + `<button class="pool-mini-btn" onclick="poolLoadBoard()">↻ Refresh</button></div>`;
  if(!rows.length){ return html+`<div class="pool-empty">No entries yet — be the first to lock in picks.</div></div>`; }
  html+=`<table class="pool-lb"><thead><tr><th>#</th><th>Player</th><th>Pts</th><th>✓</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const me = r.name===poolName ? 'me' : '';
    const ch = r.champion ? ` <span class="lb-champ">🏆 ${flag(r.champion)}</span>` : '';
    html+=`<tr class="${me}"><td>${i+1}</td><td>${poolEsc(r.name)}${ch}</td><td class="lb-pts">${r.pts}</td><td>${r.correct}</td></tr>`;
  });
  return html + `</tbody></table><div class="pool-hint">R32 1 · R16 2 · QF 4 · SF 8 · Final 16 · 3rd 4 · Champion +${POOL_CHAMP_BONUS}. Other players' picks reveal after each kickoff.</div></div>`;
}
function poolHeaderHTML(){
  return `<div class="pool-hdr"><div class="pool-hdr-l">`
    + `<span class="pool-you">👤 ${poolEsc(poolName)}</span>`
    + `<span class="pool-code">code: <b>${poolEsc(poolMe)}</b> <button class="pool-mini-btn" onclick="poolCopyCode()">copy</button></span></div>`
    + `<div class="pool-subtabs">`
    + `<button class="pool-st ${poolSub==='bracket'?'active':''}" onclick="poolSetSub('bracket')">My Bracket</button>`
    + `<button class="pool-st ${poolSub==='leaderboard'?'active':''}" onclick="poolSetSub('leaderboard')">Leaderboard</button></div>`
    + `<button class="pool-leave" onclick="poolLeave()">leave</button></div>`;
}
function poolJoinHTML(){
  if(poolJoinMode==='signup'){
    return `<div class="pool-join"><h3>🔮 Join the Pool</h3>`
      + `<p class="pool-join-sub">First time here? Enter the shared pool code, your name, and choose a personal code — that code is all you'll need to get back in later, even on a new device.</p>`
      + `<label class="pool-field"><span>Pool code</span><input id="poolCodeInput" placeholder="shared family code" value="${poolEsc(poolPool)}"></label>`
      + `<label class="pool-field"><span>Your name</span><input id="poolNameInput" placeholder="e.g. Kevin" value="${poolEsc(poolName)}"></label>`
      + `<label class="pool-field"><span>Personal code <small>(your login — leave blank to auto-generate)</small></span><input id="poolMeInput" placeholder="optional" value="${poolEsc(poolMe)}"></label>`
      + `<button class="pool-go" onclick="poolSignupSubmit()">Create my bracket</button>`
      + `<div class="pool-join-note">Already signed up? <a class="pool-link" onclick="poolSetJoinMode('login')">Log in with your personal code</a></div></div>`;
  }
  return `<div class="pool-join"><h3>🔮 Knockout Prediction Pool</h3>`
    + `<p class="pool-join-sub">Enter your personal code to open your bracket.</p>`
    + `<label class="pool-field"><span>Personal code</span><input id="poolMeInput" placeholder="your code" value="${poolEsc(poolMe)}"></label>`
    + `<button class="pool-go" onclick="poolLoginSubmit()">Open my bracket</button>`
    + `<div class="pool-join-note">New here? <a class="pool-link" onclick="poolSetJoinMode('signup')">Sign up</a> to join the pool.</div></div>`;
}
function renderPool(){
  const c=document.getElementById('view-pool');
  if(!c) return;
  if(!poolMe){ c.innerHTML=poolJoinHTML(); return; }
  POOL_ADV=advancedSets();
  POOL_R32FX=r32Fixtures();
  validateBracket();
  c.innerHTML = poolHeaderHTML() + (poolSub==='leaderboard' ? poolLeaderboardHTML() : poolBracketHTML());
}
async function poolInit(){
  if(poolMe){
    try{ const r=await fetch(`${PROXY}?type=poolload&me=${encodeURIComponent(poolMe)}`);
      const d=await r.json();
      if(d && d.entry){ poolPicks=d.entry.picks||{}; poolChampion=d.entry.champion||''; if(d.entry.name) poolName=d.entry.name; }
    }catch(e){}
  }
  if(typeof currentView!=='undefined' && currentView==='pool') renderPool();
}
poolInit();


// ─── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('clockTzLabel').textContent = tzLabel();
applyTheme();
setInterval(applyTheme, 60000); // re-check theme each minute
updateClock();
setInterval(updateClock, 1000);
refreshAll();
if (syncCode) syncLoad(); // pull cloud favorites if sync is on

// Live minute ticker: while a match is live and the schedule tab is showing,
// re-render every 20s so the clock label (1st Half 23', etc.) advances between
// the full data refreshes.
setInterval(() => {
  const anyLive = allMatches.some(m => matchStatus(m) === 'live');
  if (anyLive && currentView === 'schedule') renderSchedule();
}, 20000);

// Restore the last tab the user was on (defaults to schedule)
(function restoreLastTab() {
  const last = localStorage.getItem('wc_last_tab');
  if (last && last !== 'schedule') {
    if (last === 'pool') { showView('pool', null); return; }
    const tabs = document.querySelectorAll('.tab');
    for (const t of tabs) {
      if (t.getAttribute('onclick')?.includes(`'${last}'`)) { t.click(); break; }
    }
  }
})();
</script>
