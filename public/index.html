<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" integrity="sha384-aGlMNK3U/x0wl4lEH5jD1PGhJlX9hApuPmIiA5gtiYCOQ1J8ejIdC0btaU/TMoBD" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

/* ===== CONFIG ===== */
/* ===== Auth + logging run server-side (Cloudflare Pages Function in /functions/api).
   Code words and the Google Sheet URL live in environment variables, never in this file. ===== */

/* ===== Verified generators (600,000 tested, 0 errors) ===== */
const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pick = (a) => a[Math.floor(Math.random() * a.length)];
const shuffle = (a) => { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };
const gcd = (a, b) => { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a || 1; };
const simp = (n, d) => { if (d < 0) { n = -n; d = -d; } const g = gcd(n, d) || 1; return [n / g, d / g]; };
const fracStr = (n, d) => (d === 1 ? `${n}` : `${n}/${d}`);
const r1 = (x) => Math.round(x * 10) / 10;
const r2 = (x) => Math.round(x * 100) / 100;

/* ---- Unit 1: Fractions & Decimals ---- */
function genFractions() {
  const op = pick(["+", "−", "×", "÷"]);
  let d1 = rnd(3, 10), d2 = rnd(3, 10), n1 = rnd(1, d1 - 1), n2 = rnd(1, d2 - 1);
  if (op === "−" && n1 / d1 < n2 / d2) { [n1, n2] = [n2, n1]; [d1, d2] = [d2, d1]; }
  let rn, rd;
  if (op === "+") { rn = n1 * d2 + n2 * d1; rd = d1 * d2; }
  else if (op === "−") { rn = n1 * d2 - n2 * d1; rd = d1 * d2; }
  else if (op === "×") { rn = n1 * n2; rd = d1 * d2; }
  else { rn = n1 * d2; rd = d1 * n2; }
  [rn, rd] = simp(rn, rd);
  return { type: "fraction", prompt: `${n1}/${d1}   ${op}   ${n2}/${d2}`, value: rn / rd, tol: 0.005, display: fracStr(rn, rd), explain: `Common denominator (or multiply/flip for × ÷), then simplify → ${fracStr(rn, rd)}.` };
}
function genGcfLcm() {
  const a = rnd(2, 16), b = rnd(2, 16);
  if (pick(["gcf", "lcm"]) === "gcf") { const g = gcd(a, b); return { type: "numeric", prompt: `GCF of ${a} and ${b}?`, value: g, tol: 0.011, display: `${g}`, explain: `The largest factor both share is ${g}.` }; }
  const l = a * b / gcd(a, b); return { type: "numeric", prompt: `LCM of ${a} and ${b}?`, value: l, tol: 0.011, display: `${l}`, explain: `a×b ÷ GCF = ${a}×${b} ÷ ${gcd(a, b)} = ${l}.` };
}
function genDecimals() {
  const op = pick(["+", "−", "×"]); let a, b, value;
  if (op === "×") { a = r1(rnd(11, 99) / 10); b = rnd(2, 12); value = r2(a * b); }
  else { a = r2(rnd(50, 4000) / 100); b = r2(rnd(50, 4000) / 100); if (op === "−" && b > a) [a, b] = [b, a]; value = r2(op === "+" ? a + b : a - b); }
  return { type: "numeric", prompt: `${a}  ${op}  ${b}`, value, tol: 0.011, display: `${value}`, explain: `Line up the decimal points (or count decimal places for ×). Answer: ${value}.` };
}

/* ---- Unit 2: Rational Numbers ---- */
function genIntegers() {
  const op = pick(["+", "−", "×", "÷"]); let a, b, value;
  if (op === "÷") { b = rnd(2, 9) * pick([1, -1]); const q = rnd(2, 9) * pick([1, -1]); a = b * q; value = q; }
  else if (op === "×") { a = rnd(2, 12) * pick([1, -1]); b = rnd(2, 12) * pick([1, -1]); value = a * b; }
  else { a = rnd(-15, 15); b = rnd(-15, 15); value = op === "+" ? a + b : a - b; }
  const bb = b < 0 ? `(${b})` : `${b}`;
  return { type: "numeric", prompt: `${a}  ${op}  ${bb}`, value, tol: 0.011, display: `${value}`, explain: `Watch the signs. Answer: ${value}.` };
}
function genRationals() {
  const t = pick(["fadd", "dmul", "fdiv"]);
  if (t === "fadd") { const n1 = rnd(1, 7) * pick([1, -1]), d1 = rnd(2, 8), n2 = rnd(1, 7) * pick([1, -1]), d2 = rnd(2, 8);
    let rn = n1 * d2 + n2 * d1, rd = d1 * d2; [rn, rd] = simp(rn, rd);
    return { type: "fraction", prompt: `${fracStr(n1, d1)}   +   ${fracStr(n2, d2)}`, value: rn / rd, tol: 0.005, display: fracStr(rn, rd), explain: `Common denominator, mind the signs → ${fracStr(rn, rd)}.` }; }
  if (t === "dmul") { const a = r1(rnd(11, 60) / 10) * pick([1, -1]); const b = rnd(2, 9) * pick([1, -1]); const v = r2(a * b);
    return { type: "numeric", prompt: `${a}  ×  ${b < 0 ? `(${b})` : b}`, value: v, tol: 0.011, display: `${v}`, explain: `Multiply, then set the sign (same → +, different → −). Answer: ${v}.` }; }
  const n1 = rnd(1, 7) * pick([1, -1]), d1 = rnd(2, 8), n2 = rnd(1, 7), d2 = rnd(2, 8);
  let rn = n1 * d2, rd = d1 * n2; [rn, rd] = simp(rn, rd);
  return { type: "fraction", prompt: `${fracStr(n1, d1)}   ÷   ${fracStr(n2, d2)}`, value: rn / rd, tol: 0.005, display: fracStr(rn, rd), explain: `Divide = multiply by the reciprocal → ${fracStr(rn, rd)}.` };
}
function genAbsValue() {
  const t = pick(["abs", "opp", "dist"]);
  if (t === "abs") { const x = rnd(-20, 20); return { type: "numeric", prompt: `|${x}| = ?`, value: Math.abs(x), tol: 0.011, display: `${Math.abs(x)}`, explain: `Absolute value is distance from 0 → ${Math.abs(x)}.` }; }
  if (t === "opp") { const x = rnd(-20, 20) || 7; return { type: "numeric", prompt: `What is the opposite of ${x}?`, value: -x, tol: 0.011, display: `${-x}`, explain: `The opposite flips the sign → ${-x}.` }; }
  const a = rnd(-12, 12); let b = rnd(-12, 12); while (b === a) b = rnd(-12, 12);
  return { type: "numeric", prompt: `Distance between ${a} and ${b} on a number line?`, value: Math.abs(a - b), tol: 0.011, display: `${Math.abs(a - b)}`, explain: `|${a} − (${b})| = ${Math.abs(a - b)}.` };
}
function genFracToDec() {
  const d = pick([2, 4, 5, 8, 10, 20, 25]); const n = rnd(1, d - 1); const v = n / d;
  return { type: "numeric", prompt: `Write ${n}/${d} as a decimal.`, value: v, tol: 0.005, display: `${v}`, explain: `${n} ÷ ${d} = ${v}.` };
}

/* ---- Unit 3: Expressions, Equations & Inequalities ---- */
function genPemdas() {
  const tmpl = rnd(1, 4); let prompt, value;
  const a = rnd(2, 9), b = rnd(2, 9), c = rnd(2, 6);
  if (tmpl === 1) { prompt = `${a} + ${b} × ${c}`; value = a + b * c; }
  else if (tmpl === 2) { prompt = `(${a} + ${b}) × ${c}`; value = (a + b) * c; }
  else if (tmpl === 3) { const s = rnd(2, 5); prompt = `${a} + ${s}²`; value = a + s * s; }
  else { prompt = `${a * c} ÷ ${c} + ${b}`; value = a + b; }
  return { type: "numeric", prompt, value, tol: 0.011, display: `${value}`, explain: `Parentheses, Exponents, ×÷, then +−. Answer: ${value}.` };
}
function genEvaluate() {
  const a = rnd(2, 9), b = rnd(-6, 9), x = rnd(-5, 8);
  if (pick(["lin", "sq"]) === "lin") { const val = a * x + b; const bb = b < 0 ? `− ${-b}` : `+ ${b}`;
    return { type: "numeric", prompt: `Evaluate ${a}x ${bb} when x = ${x}.`, value: val, tol: 0.011, display: `${val}`, explain: `${a}(${x}) ${b < 0 ? "−" : "+"} ${Math.abs(b)} = ${val}.` }; }
  const c = rnd(2, 5); const val = a * x * x + c;
  return { type: "numeric", prompt: `Evaluate ${a}x² + ${c} when x = ${x}.`, value: val, tol: 0.011, display: `${val}`, explain: `${a}(${x})² + ${c} = ${a * x * x} + ${c} = ${val}.` };
}
function genExpressions() {
  const a = rnd(2, 6), b = rnd(2, 9), c = rnd(1, 6);
  const coef = a + c, con = a * b; const correct = `${coef}x + ${con}`;
  const opts = new Set([correct]);
  opts.add(`${coef}x + ${a * b + b}`); opts.add(`${a + c + 1}x + ${con}`); opts.add(`${coef}x + ${con + a}`);
  const arr = shuffle([...opts].slice(0, 4));
  return { type: "choice", prompt: `Simplify:   ${a}(x + ${b}) + ${c}x`, choices: arr, answerIndex: arr.indexOf(correct), display: correct, explain: `Distribute: ${a}x + ${a * b}, then add ${c}x → ${correct}.` };
}
function genOneStepEq() {
  const t = pick(["add", "sub", "mul", "div"]);
  if (t === "add") { const x = rnd(-12, 20), b = rnd(1, 15); return { type: "numeric", prompt: `Solve:   x + ${b} = ${x + b}`, value: x, tol: 0.011, display: `x = ${x}`, explain: `Subtract ${b}: x = ${x + b} − ${b} = ${x}.` }; }
  if (t === "sub") { const x = rnd(-12, 20), b = rnd(1, 15); return { type: "numeric", prompt: `Solve:   x − ${b} = ${x - b}`, value: x, tol: 0.011, display: `x = ${x}`, explain: `Add ${b}: x = ${x - b} + ${b} = ${x}.` }; }
  if (t === "mul") { const a = rnd(2, 9), x = rnd(-8, 9); return { type: "numeric", prompt: `Solve:   ${a}x = ${a * x}`, value: x, tol: 0.011, display: `x = ${x}`, explain: `Divide by ${a}: x = ${a * x} ÷ ${a} = ${x}.` }; }
  const a = rnd(2, 9), q = rnd(-8, 9); return { type: "numeric", prompt: `Solve:   x ÷ ${a} = ${q}`, value: q * a, tol: 0.011, display: `x = ${q * a}`, explain: `Multiply by ${a}: x = ${q} × ${a} = ${q * a}.` };
}
function genOneStepIneq() {
  const op = pick(["<", ">", "≤", "≥"]);
  if (pick(["add", "mul"]) === "add") { const x = rnd(-8, 12), b = rnd(1, 12); const c = x + b;
    return { type: "numeric", prompt: `Solve:   x + ${b} ${op} ${c}\nx ${op} ?`, value: x, tol: 0.011, display: `x ${op} ${x}`, explain: `Subtract ${b}: x ${op} ${c} − ${b} = ${x}.` }; }
  const a = rnd(2, 6), x = rnd(-6, 8); const c = a * x;
  return { type: "numeric", prompt: `Solve:   ${a}x ${op} ${c}\nx ${op} ?`, value: x, tol: 0.011, display: `x ${op} ${x}`, explain: `Divide by ${a} (positive, so keep the sign): x ${op} ${x}.` };
}

/* ---- Unit 4: Ratios, Proportions & Percents ---- */
function genRatios() {
  const t = pick(["speed", "unit", "scale"]);
  if (t === "speed") { const mpm = rnd(2, 12) * 5; const m = rnd(2, 6); const dist = mpm * m;
    return { type: "numeric", prompt: `Beach FC drill: ran ${dist} meters in ${m} minutes. Meters per minute?`, value: mpm, tol: 0.011, display: `${mpm} m/min`, explain: `${dist} ÷ ${m} = ${mpm} m/min.` }; }
  if (t === "unit") { const each = rnd(2, 9); const q = rnd(3, 8); const total = each * q;
    return { type: "numeric", prompt: `${q} candy bars cost $${total}. Cost of 1 candy bar?`, value: each, tol: 0.011, display: `$${each}`, explain: `${total} ÷ ${q} = $${each} each.` }; }
  const each = rnd(2, 6); const q1 = rnd(2, 5); const q2 = rnd(6, 10); const total = each * q2;
  return { type: "numeric", prompt: `If ${q1} ring pops cost $${each * q1}, how much do ${q2} ring pops cost?`, value: total, tol: 0.011, display: `$${total}`, explain: `Unit price $${each}. ${each} × ${q2} = $${total}.` };
}
function genProportions() {
  const t = pick(["solve", "candy", "soccer"]);
  if (t === "solve") { const b = rnd(3, 9); const k = rnd(2, 6); const a = rnd(1, b - 1); const d = b * k; const x = a * k;
    return { type: "numeric", prompt: `Solve for x:   ${a}/${b} = x/${d}`, value: x, tol: 0.011, display: `${x}`, explain: `${d} ÷ ${b} = ${k}, so x = ${a} × ${k} = ${x}.` }; }
  if (t === "candy") { const k = rnd(2, 8); const x1 = rnd(2, 5); const x2 = rnd(6, 12);
    return { type: "numeric", prompt: `Candy is the same price per piece. ${x1} pieces cost $${k * x1}. Cost of ${x2} pieces?`, value: k * x2, tol: 0.011, display: `$${k * x2}`, explain: `Unit rate $${k}/piece. ${k} × ${x2} = $${k * x2}.` }; }
  const k = rnd(1, 4); const g = rnd(3, 8);
  return { type: "numeric", prompt: `Beach FC scores a steady ${k} goal${k > 1 ? "s" : ""} per game. Goals in ${g} games?`, value: k * g, tol: 0.011, display: `${k * g}`, explain: `${k} × ${g} = ${k * g} goals.` };
}
function genSlope() {
  const m = rnd(-4, 4) || 2; const x1 = rnd(-6, 6); let x2 = rnd(-6, 6); while (x2 === x1) x2 = rnd(-6, 6);
  const y1 = rnd(-6, 6); const y2 = y1 + m * (x2 - x1);
  return { type: "numeric", prompt: `Find the slope through (${x1}, ${y1}) and (${x2}, ${y2}).`, value: m, tol: 0.011, display: `${m}`, explain: `(${y2}−${y1}) ÷ (${x2}−${x1}) = ${y2 - y1}/${x2 - x1} = ${m}.` };
}
function genPercents() {
  const t = pick(["of", "what", "discount", "tip"]);
  if (t === "of") { const p = pick([5, 10, 15, 20, 25, 30, 40, 50, 60, 75]); const n = rnd(2, 40) * 5; const v = r2(p / 100 * n);
    return { type: "numeric", prompt: `What is ${p}% of ${n}?`, value: v, tol: 0.011, display: `${v}`, explain: `${p}% = ${p / 100}. ${p / 100} × ${n} = ${v}.` }; }
  if (t === "what") { const n = rnd(4, 20) * 5; const x = rnd(1, n / 5) * 5; const v = r2(x / n * 100);
    return { type: "numeric", prompt: `What percent of ${n} is ${x}?`, value: v, tol: 0.05, display: `${v}%`, explain: `${x} ÷ ${n} = ${r2(x / n)}, ×100 = ${v}%.` }; }
  if (t === "discount") { const price = rnd(2, 30) * 5; const p = pick([10, 15, 20, 25, 30, 40, 50]); const v = r2(price * (1 - p / 100));
    return { type: "numeric", prompt: `A $${price} bag of candy is ${p}% off. New price?`, value: v, tol: 0.011, display: `$${v}`, explain: `Pay ${100 - p}%: ${price} × ${(100 - p) / 100} = $${v}.` }; }
  const price = rnd(2, 30) * 5; const p = pick([5, 10, 15, 20, 25]); const v = r2(price * (1 + p / 100));
  return { type: "numeric", prompt: `A $${price} snack-bar bill plus a ${p}% tip. Total?`, value: v, tol: 0.011, display: `$${v}`, explain: `Pay ${100 + p}%: ${price} × ${(100 + p) / 100} = $${v}.` };
}
function genPercentChange() {
  const o = pick([[10, 10], [20, 5], [25, 4], [50, 2]]); const p = o[0]; const mult = o[1];
  const start = rnd(2, 20) * mult; const change = start * p / 100; const dir = pick(["increase", "decrease"]);
  const nw = dir === "increase" ? start + change : start - change;
  return { type: "numeric", prompt: `A price changes from $${start} to $${nw}. Percent ${dir}?`, value: p, tol: 0.05, display: `${p}%`, explain: `Change ${change} ÷ original ${start} = ${r2(change / start)}, ×100 = ${p}%.` };
}
function genSimpleInterest() {
  const P = rnd(2, 20) * 100; const r = pick([2, 3, 4, 5, 6, 8, 10]); const t = rnd(1, 5); const I = P * (r / 100) * t;
  return { type: "numeric", prompt: `Simple interest: P = $${P}, r = ${r}% per year, t = ${t} years. Interest?`, value: I, tol: 0.011, display: `$${I}`, explain: `I = Prt = ${P} × ${r / 100} × ${t} = $${I}.` };
}

/* ---- Unit 5: Geometry ---- */
function genCircles() {
  const r = rnd(2, 12); const PI = 3.14;
  if (pick(["area", "circ"]) === "area") { const v = r2(PI * r * r); return { type: "numeric", prompt: `Circle radius = ${r}. Area? (use π ≈ 3.14)`, value: v, tol: 0.5, display: `${v}`, explain: `A = πr² = 3.14 × ${r}² = ${v}.` }; }
  const v = r2(2 * PI * r); return { type: "numeric", prompt: `Circle radius = ${r}. Circumference? (use π ≈ 3.14)`, value: v, tol: 0.5, display: `${v}`, explain: `C = 2πr = 2 × 3.14 × ${r} = ${v}.` };
}
function genPolygonArea() {
  const t = pick(["tri", "para", "trap"]);
  if (t === "tri") { const b = rnd(3, 20), h = rnd(2, 18); const A = b * h / 2; return { type: "numeric", prompt: `Triangle: base ${b}, height ${h}. Area?`, value: A, tol: 0.011, display: `${A}`, explain: `½ × b × h = ½ × ${b} × ${h} = ${A}.` }; }
  if (t === "para") { const b = rnd(3, 20), h = rnd(2, 18); const A = b * h; return { type: "numeric", prompt: `Parallelogram: base ${b}, height ${h}. Area?`, value: A, tol: 0.011, display: `${A}`, explain: `b × h = ${b} × ${h} = ${A}.` }; }
  const b1 = rnd(3, 12), b2 = rnd(3, 12), h = rnd(2, 12); const A = (b1 + b2) / 2 * h;
  return { type: "numeric", prompt: `Trapezoid: bases ${b1} and ${b2}, height ${h}. Area?`, value: A, tol: 0.011, display: `${A}`, explain: `½(b₁+b₂)h = ½(${b1}+${b2})×${h} = ${A}.` };
}
function genVolume() {
  if (pick(["rect", "tri"]) === "rect") { const l = rnd(2, 10), w = rnd(2, 10), h = rnd(2, 10); const V = l * w * h;
    return { type: "numeric", prompt: `Rectangular prism ${l} × ${w} × ${h}. Volume?`, value: V, tol: 0.011, display: `${V}`, explain: `l×w×h = ${l}×${w}×${h} = ${V}.` }; }
  const b = rnd(3, 12), ht = rnd(2, 12), len = rnd(2, 12); const V = (b * ht / 2) * len;
  return { type: "numeric", prompt: `Triangular prism: triangle base ${b}, triangle height ${ht}, length ${len}. Volume?`, value: V, tol: 0.011, display: `${V}`, explain: `(½ × ${b} × ${ht}) × ${len} = ${b * ht / 2} × ${len} = ${V}.` };
}
function genSurfaceArea() {
  const l = rnd(2, 9), w = rnd(2, 9), h = rnd(2, 9); const SA = 2 * (l * w + l * h + w * h);
  return { type: "numeric", prompt: `Rectangular prism ${l} × ${w} × ${h}. Surface area?`, value: SA, tol: 0.011, display: `${SA}`, explain: `2(lw+lh+wh) = 2(${l * w}+${l * h}+${w * h}) = ${SA}.` };
}

/* ---- Unit 6: Statistics ---- */
function genStats() {
  const t = pick(["mean", "median", "mode", "range"]);
  if (t === "mode") {
    const modeVal = rnd(1, 20); const others = []; while (others.length < 3) { const v = rnd(1, 20); if (v !== modeVal && !others.includes(v)) others.push(v); }
    const set = shuffle([modeVal, modeVal, modeVal, ...others]);
    return { type: "numeric", prompt: `Find the mode: ${set.join(", ")}`, value: modeVal, tol: 0.011, display: `${modeVal}`, explain: `${modeVal} appears most often → ${modeVal}.` };
  }
  const n = rnd(5, 6); const arr = []; for (let i = 0; i < n; i++) arr.push(rnd(1, 20));
  if (t === "range") { const mx = Math.max(...arr), mn = Math.min(...arr); return { type: "numeric", prompt: `Find the range: ${arr.join(", ")}`, value: mx - mn, tol: 0.011, display: `${mx - mn}`, explain: `Max ${mx} − min ${mn} = ${mx - mn}.` }; }
  if (t === "median") { const s = [...arr].sort((a, b) => a - b); const med = n % 2 ? s[(n - 1) / 2] : (s[n / 2 - 1] + s[n / 2]) / 2; return { type: "numeric", prompt: `Find the median: ${arr.join(", ")}`, value: med, tol: 0.011, display: `${med}`, explain: `Sorted: ${s.join(", ")}. Middle value → ${med}.` }; }
  let s = arr.reduce((a, b) => a + b, 0); const rem = s % n; if (rem !== 0) arr[arr.length - 1] += (n - rem);
  s = arr.reduce((a, b) => a + b, 0); const mean = s / n;
  return { type: "numeric", prompt: `Find the mean: ${arr.join(", ")}`, value: mean, tol: 0.011, display: `${mean}`, explain: `Sum ${s} ÷ ${n} = ${mean}.` };
}
function genMAD() {
  const m = rnd(6, 15); const d = rnd(1, 5), e = rnd(1, 5);
  const set = shuffle([m - d, m - e, m + e, m + d]); const mad = (d + e + e + d) / 4;
  return { type: "numeric", prompt: `Find the mean absolute deviation: ${set.join(", ")}`, value: mad, tol: 0.011, display: `${mad}`, explain: `Mean is ${m}; distances ${d}, ${e}, ${e}, ${d}. MAD = (${d}+${e}+${e}+${d})/4 = ${mad}.` };
}

function parseNum(s) {
  if (s == null) return null;
  let t = String(s).trim().replace(/[$%°]/g, ""); // keep spaces: needed for mixed numbers
  if (t === "" || t === "-") return null;
  // mixed number, e.g. "1 1/15" = 1 + 1/15 = 16/15 (sign of whole applies to the fraction)
  const mixed = t.match(/^(-?\d+)\s+(\d+)\/(\d+)$/);
  if (mixed) {
    const w = Number(mixed[1]), na = Number(mixed[2]), nb = Number(mixed[3]);
    if (nb === 0) return null;
    return w + (w < 0 ? -1 : 1) * (na / nb);
  }
  t = t.replace(/\s/g, "");
  if (t.includes("/")) { const [a, b] = t.split("/"); const na = Number(a), nb = Number(b); if (!isFinite(na) || !isFinite(nb) || nb === 0) return null; return na / nb; }
  const n = Number(t); return isFinite(n) ? n : null;
}
function isCorrect(problem, input, choiceIndex) {
  if (problem.type === "choice") return choiceIndex === problem.answerIndex;
  const v = parseNum(input);
  if (v === null) return false;
  return Math.abs(v - problem.value) <= (problem.tol || 0.011);
}

];
const TEAM_MAP = Object.fromEntries(TEAMS.map((t) => [t.id, t]));

const _mem = {};
const Store = {
  get(k) { try { return localStorage.getItem(k); } catch (e) { return k in _mem ? _mem[k] : null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch (e) { _mem[k] = v; } },
};
function logEvent(payload) {
  try { fetch("/api/log", { method: "POST", credentials: "include", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }); } catch (e) {}
}

const dayStr = (d = new Date()) => `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
const yesterdayStr = () => { const d = new Date(); d.setDate(d.getDate() - 1); return dayStr(d); };
const DEFAULT_AVATAR = { skin: 0, hair: 0, hairColor: 0, face: 0, body: 0 };
const DEFAULT_KIT = { pieces: [], closet: [], team: null, variant: "home", tokens: 0, milestones: [], lastPrizeDay: "", prizeCount: 0, lastUnlock: null };
const DEFAULT_PROGRESS = { xp: 0, streak: 0, lastDay: "", today: { day: "", count: 0 }, topics: {}, queue: [], avatar: { ...DEFAULT_AVATAR }, kit: { ...DEFAULT_KIT } };
/* Deep-fills avatar/kit so progress saved before this feature (or from KV) never has
   undefined nested fields. Safe to run on any progress object, including null. */
function normalizeProgress(p) {
  const base = p && typeof p === "object" ? p : {};
  return {
    ...DEFAULT_PROGRESS, ...base,
    today: { ...DEFAULT_PROGRESS.today, ...(base.today || {}) },
    avatar: { ...DEFAULT_AVATAR, ...(base.avatar || {}) },
    kit: { ...DEFAULT_KIT, ...(base.kit || {}) },
  };
}
function loadProgress(key) {
  try { const raw = Store.get(key); if (raw) return normalizeProgress(JSON.parse(raw)); } catch (e) {}
  return normalizeProgress(null);
}
function snapshot(p) {
  return { key: p.key, topicId: p.topicId, type: p.type, prompt: p.prompt, display: p.display, explain: p.explain, value: p.value, tol: p.tol, answerIndex: p.answerIndex, choices: p.choices, hits: 0 };
}
function applyAnswer(p, correct, problem) {
  const today = dayStr(); let { streak, lastDay } = p; let today_ = p.today;
  if (today_.day !== today) { streak = lastDay === yesterdayStr() ? streak + 1 : 1; lastDay = today; today_ = { day: today, count: 0 }; }
  today_ = { day: today, count: today_.count + 1 };
  const t = p.topics[problem.topicId] || { correct: 0, attempts: 0 };
  const nt = { correct: t.correct + (correct ? 1 : 0), attempts: t.attempts + 1 };
  let queue = p.queue || [];
  const inQueue = queue.some((it) => it.key === problem.key);
  if (inQueue) {
    queue = queue.map((it) => (it.key === problem.key ? { ...it, hits: correct ? it.hits + 1 : 0 } : it)).filter((it) => it.hits < 2);
  } else if (!correct) {
    queue = [...queue, snapshot(problem)]; if (queue.length > 60) queue = queue.slice(queue.length - 60);
  }
  // --- Avatar / World Cup kit rewards (lastUnlock keeps its old reference unless something
  //     new is granted, so the UI can detect a fresh unlock by identity). ---
  const kit = { ...DEFAULT_KIT, ...(p.kit || {}) };
  let bonusXp = 0;
  // Base kit: one piece per completed DAILY_GOAL, up to MAX_DAILY_PRIZES per day.
  // prizeCount resets when the day rolls over.
  let prizeCount = kit.lastPrizeDay === today ? (kit.prizeCount || 0) : 0;
  const earnable = Math.min(Math.floor(today_.count / DAILY_GOAL), MAX_DAILY_PRIZES);
  let awarded = null;
  while (prizeCount < earnable) {
    const piece = nextKitPiece(kit.pieces);
    if (piece) { kit.pieces = [...kit.pieces, piece.id]; awarded = piece; }
    else { bonusXp += 20; } // base kit already complete — small XP bonus instead
    prizeCount++;
  }
  kit.lastPrizeDay = today;
  kit.prizeCount = prizeCount;
  if (awarded) kit.lastUnlock = { type: "piece", id: awarded.id, label: awarded.name, emoji: awarded.emoji, at: Date.now() };
  const claimed = kit.milestones || [];
  const reached = streakMilestones(streak).filter((m) => !claimed.includes(m));
  if (reached.length) {
    kit.milestones = [...claimed, ...reached];
    kit.tokens = (kit.tokens || 0) + reached.length;
    const top = reached[reached.length - 1];
    kit.lastUnlock = { type: "milestone", id: "streak-" + top, label: MILESTONE_PERKS[top] || (top + "-day streak"), streak: top, tokens: reached.length, at: Date.now() };
  }
  return { ...p, xp: p.xp + (correct ? 10 : 2) + bonusXp, streak, lastDay, today: today_, topics: { ...p.topics, [problem.topicId]: nt }, queue, kit };
}
function makeProblem(tid) { const p = TOPIC_MAP[tid].gen(); return { ...p, topicId: tid, key: tid + "|" + p.prompt }; }
/* adaptive selection: weight toward weakest topics, and surface due review-misses */
function weightedTopic(pool, progress) {
  const weights = pool.map((tid) => {
    const s = (progress.topics || {})[tid] || { correct: 0, attempts: 0 };
    const acc = s.attempts > 0 ? s.correct / s.attempts : 0.5;
    let w = 1 + (1 - acc) * 3;
    if (s.attempts < 3) w += 1;
    if (s.correct >= MASTERY_GOAL) w *= 0.35;
    return Math.max(0.15, w);
  });
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) { r -= weights[i]; if (r <= 0) return pool[i]; }
  return pool[pool.length - 1];
}
function drawSmart(pool, progress) {
  const poolSet = new Set(pool);
  const due = (progress.queue || []).filter((it) => poolSet.has(it.topicId));
  const missChance = Math.min(0.4, due.length * 0.08);
  if (due.length && Math.random() < missChance) return { ...pick(due) };
  return makeProblem(weightedTopic(pool, progress));
}

        <div style={S.lockerRow}><span style={S.lockerLabel}>Hair style</span><Chips items={HAIR_STYLES} value={avatar.hair} onPick={(i) => onAvatar("hair", i)} /></div>

            const got = (kit.pieces || []).includes(pc.id);

                <span style={{ fontSize: 12, fontWeight: 700 }}>{pc.name}</span>

              </div>
            );

        <div style={S.lockerHint}>{next ? `Finish ${DAILY_GOAL} questions to earn your ${next.name.toLowerCase()} — and you can earn up to ${MAX_DAILY_PRIZES} pieces a day (every ${DAILY_GOAL} questions).` : "Full kit earned! Daily Patrols now give bonus XP. 🎉"}</div>
      </div>

      <div style={S.lockerCard}>
        <div style={S.lockerH}>Your closet {(kit.closet || []).length > 0 && <span style={{ color: "#8AA0A4", fontWeight: 600 }}>· {(kit.closet || []).length} jersey{(kit.closet || []).length === 1 ? "" : "s"}</span>}</div>
        {tokens > 0 && <div style={S.tokenBanner}>🎟️ You have {tokens} jersey claim{tokens === 1 ? "" : "s"} — pick a team below and you'll get both its home & away kits!</div>}
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-start" }}>
          <button className="focusable" onClick={() => onEquip(null)} style={{ ...S.closetTile, borderColor: kit.team == null ? "#12718E" : "#EADFC9" }}>
            <MiniJersey kit={GENERIC_KIT} />
            <span style={S.closetName}>Generic</span>
            {kit.team == null && <span style={S.equippedTag}>worn</span>}
          </button>
          {(kit.closet || []).map((id) => {
            const t = TEAM_MAP[id]; if (!t) return null;
            return (
              <div key={id} style={S.closetTeam}>
                <div style={S.closetTeamName}>{t.flag} {t.name}</div>
                <div style={{ display: "flex", gap: 6 }}>
                  {["home", "away"].map((v) => {
                    const eq = kit.team === id && (kit.variant || "home") === v;
                    return (
                      <button key={v} className="focusable" onClick={() => onEquip(id, v)} title={`Wear ${t.name} ${v} kit`}

                        <MiniJersey kit={t[v]} size={40} flag={t.flag} />
                        <span style={S.closetName}>{v === "home" ? "Home" : "Away"}</span>
                        {eq && <span style={S.equippedTag}>worn</span>}
                      </button>

                  })}

              </div>

          })}
        </div>
        {(kit.closet || []).length === 0 && tokens === 0 && <div style={S.lockerHint}>Keep your daily streak going to earn jersey claims, then collect teams here — each comes with a home and away kit.</div>}

      <div style={S.lockerCard}>
        <div style={S.lockerH}>World Cup jerseys <span style={{ color: "#8AA0A4", fontWeight: 600 }}>· all 48 teams</span></div>
        {!lockerOpen && <div style={S.lockerHint}>Reach a 3-day streak to unlock jersey claims. Milestones at 3 / 7 / 14 / 30 days each give a claim.</div>}
        {CONF_ORDER.map((conf) => (
          <div key={conf} style={{ marginTop: 12 }}>
            <div style={S.confTitle}>{CONF_NAMES[conf]}</div>
            <div style={S.teamGrid}>
              {TEAMS.filter((t) => t.conf === conf).map((t) => {
                const have = owned.has(t.id);
                const claimable = !have && tokens > 0;
                return (
                  <button key={t.id} className="focusable" disabled={!claimable && !have}
                    onClick={() => have ? onEquip(t.id, "home") : claimable ? onClaim(t.id) : null}
                    title={have ? "Owned — tap to wear home kit" : claimable ? "Claim this team (home + away)" : "Earn a streak to claim"}
                    style={{ ...S.teamTile, opacity: have || claimable ? 1 : 0.45,
                      cursor: have || claimable ? "pointer" : "default",
                      borderColor: kit.team === t.id ? "#12718E" : have ? "#2BAE8E" : "#EADFC9" }}>
                    <MiniJersey kit={t.home} size={38} flag={t.flag} />
                    <span style={S.teamName}>{t.flag} {t.name}</span>
                    <span style={S.teamState}>{have ? (kit.team === t.id ? "worn" : "owned ✓") : claimable ? "claim 🎟️" : "🔒"}</span>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </main>
  );
}

/* ===== APP (login gate -> game) ===== */
function Splash() {
  return (
    <div style={S.gateWrap}><style>{CSS}</style>
      <div style={{ textAlign: "center" }}>
        <div style={{ ...S.logo, width: 56, height: 56, fontSize: 30, margin: "0 auto" }}>⚽</div>
        <div style={{ marginTop: 12, color: "#5C7176", fontWeight: 700 }}>Beach Math…</div>
      </div>
    </div>
  );
}
function App() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);
  const [offline, setOffline] = useState(false);
  useEffect(() => {
    let done = false;
    (async () => {
      try {
        const r = await fetch("/api/me", { credentials: "include" });
        if (r.ok) { const u = await r.json(); if (!done) setUser(u); }
      } catch (e) { if (!done) setOffline(true); }
      if (!done) setChecking(false);
    })();
    return () => { done = true; };
  }, []);
  if (checking) return <Splash />;
  if (!user) return <Gate offline={offline} onLogin={setUser} />;
  return <Game key={user.id} user={user} onSwitch={async () => { try { await fetch("/api/logout", { method: "POST", credentials: "include" }); } catch (e) {} setUser(null); }} />;
}

function Gate({ onLogin, offline }) {
  const [code, setCode] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  async function go() {
    const c = code.trim();
    if (!c || busy) return;
    setBusy(true); setErr("");
    try {
      const r = await fetch("/api/login", { method: "POST", credentials: "include", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ code: c }) });
      if (r.ok) { const u = await r.json(); onLogin(u); return; }
      if (r.status === 401) { setErr("Hmm, that's not it — try again."); setBusy(false); return; }
      throw new Error("unreachable");
    } catch (e) {
      if (c.toLowerCase() === "test") { onLogin({ id: "test", name: "Test" }); return; }
      setErr('Preview mode — type "test" to look around. (Madeleine signs in on the live site.)');
      setBusy(false);
    }
  }
  return (
    <div style={S.gateWrap}>
      <style>{CSS}</style>
      <div style={S.gateCard}>
        <div style={{ ...S.logo, width: 60, height: 60, fontSize: 32, margin: "0 auto" }}>⚽</div>
        <div style={{ fontSize: 24, fontWeight: 800, marginTop: 14 }}>Beach Math</div>
        <div style={{ color: "#5C7176", marginTop: 6, fontSize: 14 }}>Enter your code word to start.</div>
        <input className="answer focusable" style={{ ...S.answerInput, marginTop: 16 }} value={code}
          onChange={(e) => { setCode(e.target.value); setErr(""); }} onKeyDown={(e) => e.key === "Enter" && go()}
          placeholder="code word" autoFocus aria-label="Code word" />
        {err && <div style={{ color: "#A23A1E", fontSize: 13, marginTop: 10, fontWeight: 700 }}>{err}</div>}
        <button className="primary focusable" style={{ ...S.primaryBtn, marginTop: 16, opacity: busy ? 0.7 : 1 }} onClick={go}>{busy ? "Checking…" : "Start →"}</button>
      </div>
    </div>
  );
}

function Game({ user, onSwitch }) {
  const storageKey = STORE_BASE + "_" + user.id;
  const [progress, setProgress] = useState(DEFAULT_PROGRESS);
  const [loaded, setLoaded] = useState(false);
  const saveTimer = useRef(null);
  const [showInfo, setShowInfo] = useState(false);
  const [view, setView] = useState("map");
  const [mode, setMode] = useState("topic");
  const [pool, setPool] = useState(ALL_IDS);
  const [activeName, setActiveName] = useState("");
  const [problem, setProblem] = useState(null);
  const [input, setInput] = useState("");
  const [picked, setPicked] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [session, setSession] = useState({ seen: 0, correct: 0 });
  const [reviewDone, setReviewDone] = useState(false);
  const [prize, setPrize] = useState(null);
  const inputRef = useRef(null);

  useEffect(() => {
    let done = false;
    (async () => {
      let p = null;
      try { const r = await fetch("/api/load", { credentials: "include" }); if (r.ok) { const j = await r.json(); p = j.progress || null; } } catch (e) {}
      if (p == null) p = loadProgress(storageKey); else p = normalizeProgress(p);
      if (!done) { setProgress(p); setLoaded(true); }
    })();
    return () => { done = true; };
  }, []);
  useEffect(() => {
    if (!loaded) return;
    Store.set(storageKey, JSON.stringify(progress));
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      fetch("/api/save", { method: "POST", credentials: "include", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ progress }) }).catch(() => {});
    }, 700);
  }, [progress, loaded]);

  const level = Math.floor(progress.xp / 100) + 1;
  const intoLevel = progress.xp % 100;
  const todayCount = progress.today.day === dayStr() ? progress.today.count : 0;
  const treats = useMemo(() => TOPICS.filter((t) => (progress.topics[t.id]?.correct || 0) >= MASTERY_GOAL), [progress.topics]);
  const queueLen = (progress.queue || []).length;
  const wk = currentWeek();

  if (!loaded) return <Splash />;

  function focusInput() { setTimeout(() => inputRef.current && inputRef.current.focus(), 60); }
  function begin(m, p, name) {
    setMode(m); setPool(p); setActiveName(name || ""); setSession({ seen: 0, correct: 0 }); setReviewDone(false);
    const first = m === "review"
      ? ((progress.queue || [])[0] ? { ...(progress.queue || [])[0] } : null)
      : (m === "topic" ? makeProblem(p[0]) : drawSmart(p, progress));
    if (m === "review" && !first) { setReviewDone(true); setProblem(null); } else setProblem(first);
    setInput(""); setPicked(null); setFeedback(null); setView("practice"); focusInput();
  }
  function startTopic(tid) { begin("topic", [tid], TOPIC_MAP[tid].name); }
  function startMix() { begin("mix", ALL_IDS, "Daily Patrol"); }
  function startWeek() { begin("week", SCHEDULE[wk].ids, "This Week"); }
  function startReview() { begin("review", ALL_IDS, "Review Misses"); }
  function nextProblem() {
    if (mode === "review") {
      const it = (progress.queue || [])[0];
      if (!it) { setProblem(null); setReviewDone(true); return; }
      setProblem({ ...it });
    } else if (mode === "topic") {
      setProblem(makeProblem(pool[0]));
    } else {
      setProblem(drawSmart(pool, progress));
    }
    setInput(""); setPicked(null); setFeedback(null); focusInput();
  }
  function submit() {
    if (!problem || feedback) return;
    if (problem.type === "choice" && picked === null) return;
    if (problem.type !== "choice" && input.trim() === "") return;
    const correct = isCorrect(problem, input, picked);
    const np = applyAnswer(progress, correct, problem);
    setProgress(np);
    if (np.kit.lastUnlock && np.kit.lastUnlock !== progress.kit.lastUnlock) setPrize(np.kit.lastUnlock);
    setSession((s) => ({ seen: s.seen + 1, correct: s.correct + (correct ? 1 : 0) }));
    setFeedback({ correct, problem });
    const topic = TOPIC_MAP[problem.topicId];
    logEvent({ mode, unit: topic.unit, topic: topic.name,
      correct: correct ? 1 : 0, given: problem.type === "choice" ? problem.choices[picked] : input.trim(),
      answer: problem.display, xp: np.xp, streak: np.streak, level: Math.floor(np.xp / 100) + 1 });
  }
  function onKey(e) { if (e.key === "Enter") { e.preventDefault(); feedback ? nextProblem() : submit(); } }
  function setAvatarAttr(key, value) { setProgress((p) => ({ ...p, avatar: { ...p.avatar, [key]: value } })); }
  function claimTeam(teamId) {
    setProgress((p) => {
      const k = p.kit;
      if ((k.tokens || 0) <= 0 || (k.closet || []).includes(teamId)) return p;
      const closet = [...(k.closet || []), teamId];
      const firstEver = (k.closet || []).length === 0; // claiming a team owns both its kits
      return { ...p, kit: { ...k, closet, tokens: k.tokens - 1, team: firstEver ? teamId : k.team, variant: firstEver ? "home" : k.variant } };
    });
  }
  function equipTeam(teamId, variant = "home") {
    setProgress((p) => {
      if (teamId != null && !(p.kit.closet || []).includes(teamId)) return p;
      return { ...p, kit: { ...p.kit, team: teamId, variant: teamId == null ? "home" : variant } };
    });
  }

  return (
    <div style={S.root}>
      <style>{CSS}</style>
      <header style={S.header}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={S.logo}>⚽</div>
          <div>
            <div style={S.title}>Beach Math</div>
            <div style={S.subtitle}>Hi {user.name} — {treats.length} of {TOPICS.length} treats earned</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <button className="chipbtn focusable" style={{ ...S.chip, padding: "3px 6px", position: "relative" }} onClick={() => setView("locker")} title="Locker Room — your player & jerseys">
            <PlayerAvatar avatar={progress.avatar} kit={progress.kit} size={30} pose="static" />
            {(progress.kit.tokens || 0) > 0 && <span style={S.tokenDot}>{progress.kit.tokens}</span>}
          </button>
          <button className="chipbtn focusable" style={S.chip} onClick={() => setShowInfo(true)} title="Day streak — tap for info"><span style={{ fontSize: 15 }}>🔥</span> {progress.streak}</button>
          <button className="chipbtn focusable" style={S.chip} onClick={() => setShowInfo(true)} title="Tap to see rank progression">{rankName(level)} ›</button>
        </div>
      </header>

      <div style={S.band}>
        <div style={S.bandRow}><span style={S.bandLabel}>Today's patrol</span><span style={S.bandLabel}>{Math.min(todayCount, DAILY_GOAL)} / {DAILY_GOAL}</span></div>
        <Bar pct={Math.min(todayCount / DAILY_GOAL, 1) * 100} color="#FFB740" />
        <div style={{ ...S.bandRow, marginTop: 10 }}><span style={S.bandLabel}>{rankName(level)}</span><span style={S.bandLabel}>{intoLevel} / 100 XP</span></div>
        <Bar pct={intoLevel} color="#2BAE8E" />
        {treats.length > 0 && <div style={S.treatJar}>{treats.map((t) => <span key={t.id} title={t.name}>{t.candy}</span>)}</div>}
      </div>

      {view === "map" ? (
        <MapView progress={progress} wk={wk} queueLen={queueLen} todayCount={todayCount}
          onTopic={startTopic} onMix={startMix} onWeek={startWeek} onReview={startReview} onLocker={() => setView("locker")} />
      ) : view === "locker" ? (
        <LockerView progress={progress} onBack={() => setView("map")} onAvatar={setAvatarAttr} onClaim={claimTeam} onEquip={equipTeam} />
      ) : (
        <PracticeView problem={problem} mode={mode} activeName={activeName} reviewDone={reviewDone} queueLen={queueLen}
          input={input} setInput={setInput} picked={picked} setPicked={setPicked} feedback={feedback}
          session={session} inputRef={inputRef} onKey={onKey} onSubmit={submit} onNext={nextProblem} onBack={() => setView("map")} />
      )}

      {showInfo && <InfoModal progress={progress} onClose={() => setShowInfo(false)} />}
      {prize && <PrizeModal prize={prize} progress={progress} onClose={() => setPrize(null)} onLocker={() => { setPrize(null); setView("locker"); }} />}

      <footer style={S.footer}>
        Logged in as {user.name} · <button className="linkbtn focusable" style={S.linkBtn} onClick={onSwitch}>Switch user</button>
        <div style={{ marginTop: 4 }}>Progress saves on this device · results sync to the family sheet.</div>
      </footer>
    </div>
  );
}

function InfoModal({ progress, onClose }) {
  const xp = progress.xp;
  const level = Math.floor(xp / 100) + 1;
  const toNext = level < RANKS.length ? level * 100 - xp : 0;
  return (
    <div className="overlay" style={S.overlay} onClick={onClose}>
      <div className="modal" style={S.modal} onClick={(e) => e.stopPropagation()}>
        <div style={S.modalHead}>
          <div style={{ fontSize: 18, fontWeight: 800 }}>Your Progress</div>
          <button className="focusable" style={S.xBtn} onClick={onClose} aria-label="Close">✕</button>
        </div>
        <div style={S.infoBlock}>
          <div style={{ fontWeight: 800 }}>🔥 Day streak — {progress.streak} {progress.streak === 1 ? "day" : "days"}</div>
          <div style={S.infoSub}>This counts the days in a row you practice. Do at least one problem each day to keep it going; miss a whole day and it starts back at 1.</div>
        </div>
        <div style={S.infoBlock}>
          <div style={{ fontWeight: 800 }}>{rankName(level)} · Level {level} · {xp} XP</div>
          <div style={S.infoSub}>{level < RANKS.length ? `${toNext} XP to ${rankName(level + 1)} — about ${Math.ceil(toNext / 10)} more correct answers (+10 XP each).` : "Top rank reached — Chief! 🏆"}</div>
        </div>
        <div style={{ fontWeight: 800, margin: "8px 2px 8px", fontSize: 14 }}>Lifeguard ranks</div>
        <div>
          {RANKS.map((r, i) => {
            const lvl = i + 1; const lo = (lvl - 1) * 100;
            const achieved = xp >= lo; const current = level === lvl;
            return (
              <div key={r} style={{ ...S.rankRow, ...(current ? S.rankRowCur : {}) }}>
                <span style={{ width: 22, textAlign: "center" }}>{current ? "📍" : achieved ? "✓" : "•"}</span>
                <span style={{ flex: 1, fontWeight: current ? 800 : 600, color: achieved ? INK : "#9CAFB2" }}>{r}</span>
                <span style={{ fontSize: 12.5, color: "#8AA0A4" }}>{i === RANKS.length - 1 ? "800+ XP" : `${lo}–${lvl * 100 - 1} XP`}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function PrizeModal({ prize, progress, onClose, onLocker }) {
  const isPiece = prize.type === "piece";
  return (
    <div className="overlay" style={S.overlay} onClick={onClose}>
      <div className="modal" style={{ ...S.modal, textAlign: "center" }} onClick={(e) => e.stopPropagation()}>
        <div style={{ fontSize: 13, fontWeight: 800, letterSpacing: ".06em", textTransform: "uppercase", color: "#E8853D" }}>
          {isPiece ? "Daily goal complete!" : `${prize.streak}-day streak!`}
        </div>
        <div style={{ display: "flex", justifyContent: "center", margin: "6px 0 2px" }}>
          <PlayerAvatar avatar={progress.avatar} kit={progress.kit} size={150} pose="celebrate" />
        </div>
        <div style={{ fontSize: 20, fontWeight: 800 }}>
          {isPiece ? `${prize.emoji} ${prize.label} unlocked!` : `🎟️ Jersey claim earned!`}
        </div>
        <div style={{ color: "#5C7176", marginTop: 6, fontSize: 14, lineHeight: 1.45 }}>
          {isPiece
            ? "Another piece of your kit. Keep finishing your Daily Patrol to complete the uniform."
            : `${prize.label}. Spend your claim in the Locker Room to add any World Cup team's jersey to your closet.`}
        </div>
        <button className="primary focusable" style={{ ...S.primaryBtn, marginTop: 16 }} onClick={onLocker}>Open Locker Room →</button>
        <button className="focusable" style={{ ...S.linkBtn, marginTop: 12, fontSize: 13 }} onClick={onClose}>Keep practicing</button>
      </div>
    </div>
  );
}

function MapView({ progress, wk, queueLen, todayCount, onTopic, onMix, onWeek, onReview, onLocker }) {
  const weekIds = new Set(SCHEDULE[wk].ids);
  const units = [1, 2, 3, 4, 5, 6];
  const next = nextKitPiece(progress.kit.pieces || []);
  const tokens = progress.kit.tokens || 0;
  const prizesToday = progress.kit.lastPrizeDay === dayStr() ? (progress.kit.prizeCount || 0) : 0;
  const moreForPrize = Math.max(0, DAILY_GOAL * (prizesToday + 1) - todayCount);
  const capReached = prizesToday >= MAX_DAILY_PRIZES;
  return (
    <main style={S.main}>
      <button className="mixcard focusable" style={S.lockerBanner} onClick={onLocker}>
        <PlayerAvatar avatar={progress.avatar} kit={progress.kit} size={54} pose="static" />
        <div style={{ flex: 1, textAlign: "left" }}>
          <div style={S.mixKicker}>Locker Room</div>
          <div style={{ fontWeight: 800, fontSize: 15.5, marginTop: 2 }}>
            {tokens > 0 ? `🎟️ ${tokens} jersey claim${tokens === 1 ? "" : "s"} ready!` : next ? `Next reward: ${next.emoji} ${next.name}` : "Build your World Cup player"}
          </div>
          <div style={{ fontSize: 12.5, color: "#5C7176", marginTop: 2 }}>
            {next ? (capReached ? "Come back tomorrow for the next piece" : `${moreForPrize} more today to earn it`) : "Tap to customize & swap jerseys"}
          </div>
        </div>
        <div style={S.mixArrow}>→</div>
      </button>
      <button className="mixcard focusable" style={S.weekCard} onClick={onWeek}>
        <div>
          <div style={S.mixKicker}>Week {wk + 1} of {SCHEDULE.length} · This week</div>
          <div style={S.mixTitle}>{SCHEDULE[wk].title}</div>
          <div style={S.mixSub}>{todayCount >= DAILY_GOAL ? "Patrol done today — streak safe! 🔥" : `Tap to drill just this week's skills. ${DAILY_GOAL - todayCount} to go today.`}</div>
        </div>
        <div style={S.mixArrow}>→</div>
      </button>
      <div style={S.ctaRow}>
        <button className="cta focusable" style={{ ...S.cta, background: "linear-gradient(120deg,#12718E,#2BAE8E)" }} onClick={onMix}>
          <span style={{ fontSize: 18 }}>🏖️</span> Daily Patrol<span style={S.ctaSub}>mix of everything</span>
        </button>
        <button className="cta focusable" style={{ ...S.cta, background: queueLen ? "linear-gradient(120deg,#E8853D,#E8653D)" : "#C9BFAC", cursor: queueLen ? "pointer" : "default" }} onClick={queueLen ? onReview : undefined}>
          <span style={{ fontSize: 18 }}>🎯</span> Review Misses<span style={S.ctaSub}>{queueLen ? `${queueLen} to clear` : "none yet 🎉"}</span>
        </button>
      </div>
      {units.map((u) => (
        <div key={u}>
          <div style={{ margin: "22px 2px 12px" }}><div style={{ ...S.sectionTitle, color: UNIT_META[u].color }}>{UNIT_META[u].title}</div></div>
          <div style={S.grid}>
            {TOPICS.filter((t) => t.unit === u).map((t) => (
              <TopicCard key={t.id} topic={t} stat={progress.topics[t.id]} thisWeek={weekIds.has(t.id)} onClick={() => onTopic(t.id)} />
            ))}
          </div>
        </div>
      ))}
    </main>
  );
}

function TopicCard({ topic, stat, thisWeek, onClick }) {
  const correct = stat?.correct || 0;
  const pct = Math.min(correct / MASTERY_GOAL, 1) * 100;
  const mastered = correct >= MASTERY_GOAL;
  const color = UNIT_META[topic.unit].color;
  return (
    <button className="topiccard focusable" style={S.card} onClick={onClick}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
        <span style={{ ...S.dot, background: color }} />
        {mastered ? <span style={{ ...S.masterBadge, color }}>{topic.candy} mastered</span>
          : thisWeek ? <span style={{ ...S.weekTag, color, borderColor: color }}>this week</span>
          : <span style={S.countBadge}>{correct}/{MASTERY_GOAL}</span>}
      </div>
      <div style={S.cardName}>{topic.name}</div>
      <div style={S.cardBlurb}>{topic.blurb}</div>
      <div style={{ marginTop: "auto", paddingTop: 12 }}><Bar pct={pct} color={color} thin /></div>
    </button>
  );
}

function PracticeView({ problem, mode, activeName, reviewDone, queueLen, input, setInput, picked, setPicked, feedback, session, inputRef, onKey, onSubmit, onNext, onBack }) {
  if (reviewDone || !problem) {
    return (
      <main style={S.main}>
        <div style={S.pBar}><button className="ghost focusable" style={S.backBtn} onClick={onBack}>← Map</button><div /><div /></div>
        <div style={{ ...S.problemCard, textAlign: "center", padding: "40px 22px" }}>
          <div style={{ fontSize: 40 }}>🎉</div>
          <div style={{ fontSize: 20, fontWeight: 800, marginTop: 8 }}>All misses cleared!</div>
          <div style={{ color: "#5C7176", marginTop: 6 }}>Nothing left in the review pile. Nice work.</div>
          <button className="primary focusable" style={{ ...S.primaryBtn, marginTop: 18 }} onClick={onBack}>Back to map</button>
        </div>
      </main>
    );
  }
  const topic = TOPIC_MAP[problem.topicId];
  const color = UNIT_META[topic.unit].color;
  const answered = !!feedback;
  return (
    <main style={S.main}>
      <div style={S.pBar}>
        <button className="ghost focusable" style={S.backBtn} onClick={onBack}>← Map</button>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 12, color: "#5C7176", letterSpacing: ".04em", textTransform: "uppercase", fontWeight: 700 }}>
            {mode === "topic" ? topic.name : activeName}{mode === "review" ? ` · ${queueLen} left` : ""}
          </div>
          {mode !== "topic" && <div style={{ fontSize: 13, color, fontWeight: 700, marginTop: 2 }}>{topic.name}</div>}
        </div>
        <div style={{ ...S.scorePill, minWidth: 54, textAlign: "right" }}>{session.correct}/{session.seen}</div>
      </div>
      <div style={{ ...S.refresher, borderColor: color }}><span style={{ fontWeight: 700, color }}>Remember: </span>{topic.blurb}</div>
      <div style={S.problemCard}>
        <div style={S.prompt}>{problem.prompt}</div>
        {problem.type === "choice" ? (
          <div style={S.choices}>
            {problem.choices.map((c, i) => {
              let extra = {};
              if (answered) { if (i === problem.answerIndex) extra = S.choiceRight; else if (i === picked) extra = S.choiceWrong; }
              else if (i === picked) extra = S.choiceSel;
              return (<button key={i} className="choice focusable" style={{ ...S.choiceBtn, ...extra }} onClick={() => !answered && setPicked(i)} disabled={answered}>{c}</button>);
            })}
          </div>
        ) : (
          <input ref={inputRef} className="answer focusable" style={S.answerInput} value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={onKey} placeholder="Your answer" inputMode="text" autoComplete="off" disabled={answered} aria-label="Your answer" />
        )}
        {!answered ? (
          <button className="primary focusable" style={S.primaryBtn} onClick={onSubmit}>Check</button>
        ) : (
          <div className="reveal" style={{ ...S.feedback, ...(feedback.correct ? S.fbRight : S.fbWrong) }}>
            <div style={{ fontWeight: 800, fontSize: 16 }}>{feedback.correct ? "Correct  +10 XP 🎉" : "Not quite  +2 XP"}</div>
            {!feedback.correct && <div style={{ marginTop: 4 }}>Answer: <strong>{problem.display}</strong></div>}
            <div style={{ marginTop: 6, color: "#33474C", lineHeight: 1.45 }}>{problem.explain}</div>
            {!feedback.correct && mode !== "review" && <div style={{ marginTop: 6, fontSize: 12.5, color: "#8A3C22" }}>Saved to Review Misses 🎯</div>}
            <button className="primary focusable" style={{ ...S.primaryBtn, marginTop: 14 }} onClick={onNext}>Next →</button>
          </div>
        )}
      </div>
      <div style={{ textAlign: "center", color: "#8AA0A4", fontSize: 12.5, marginTop: 14 }}>Type a number, a fraction like <code>3/4</code>, or a decimal. Press Enter to check.</div>
    </main>
  );
}

function Bar({ pct, color, thin }) {
  return (<div style={{ ...S.barTrack, height: thin ? 7 : 9 }}><div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 99, transition: "width .4s ease" }} /></div>);
}
